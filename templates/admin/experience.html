{% extends "admin/admin_base.html" %}
{% block title %}Experiencia{% endblock %}
{% block content %}
<div class="admin-section">
    <h1 class="section-title">Experiencia Laboral</h1>

    <div class="card admin-form-card">
        <h2 class="admin-subtitle">Agregar nueva experiencia</h2>
        <form method="post" action="/admin/experience/add" class="admin-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="company">Empresa</label>
                    <input type="text" id="company" name="company" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="position">Puesto</label>
                    <input type="text" id="position" name="position" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="period">Período</label>
                    <input type="text" id="period" name="period" class="form-input" placeholder="Ej: 2022 - Presente" required>
                </div>
            </div>
            <div class="form-group">
                <label for="description">Descripción</label>
                <textarea id="description" name="description" class="form-input form-textarea" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Agregar</button>
        </form>
    </div>

    <h2 class="admin-subtitle">Experiencias actuales</h2>
    {% for item in experience %}
    <div class="card admin-item-card">
        <form method="post" action="/admin/experience/edit/{{ loop.index0 }}" class="admin-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>Empresa</label>
                    <input type="text" name="company" class="form-input" value="{{ item.company }}" required>
                </div>
                <div class="form-group">
                    <label>Puesto</label>
                    <input type="text" name="position" class="form-input" value="{{ item.position }}" required>
                </div>
                <div class="form-group">
                    <label>Período</label>
                    <input type="text" name="period" class="form-input" value="{{ item.period }}" required>
                </div>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea name="description" class="form-input form-textarea" rows="2" required>{{ item.description }}</textarea>
            </div>
            <div class="admin-item-actions">
                <button type="submit" class="btn btn-primary" style="padding:8px 16px;font-size:0.85rem;">Guardar</button>
                <button type="submit" formaction="/admin/experience/delete/{{ loop.index0 }}" class="btn btn-danger" style="padding:8px 16px;font-size:0.85rem;" onclick="return confirm('¿Eliminar esta experiencia?')">Eliminar</button>
            </div>
        </form>
    </div>
    {% endfor %}
</div>
{% endblock %}
